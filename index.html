<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RegIntel — AI-Powered Indian Banking Regulatory Intelligence</title>
<meta name="description" content="Instant plain-English summaries of RBI, SEBI and IRDAI circulars. Free tool for Indian bank officers and compliance teams."/>
<meta property="og:title" content="RegIntel — RBI Circular Intelligence"/>
<meta property="og:description" content="77% faster regulatory understanding. AI summaries, checklists and risk ratings for every RBI/SEBI/IRDAI circular."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #13161e; --surface2: #1a1d28;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e4e0d8; --muted: #7a7670; --muted2: #4a4a52;
    --gold: #e8b84b; --gold2: #f5d48a; --goldDim: rgba(232,184,75,0.12);
    --blue: #4d9de0; --blueDim: rgba(77,157,224,0.12);
    --green: #3ecf8e; --greenDim: rgba(62,207,142,0.1);
    --red: #f06460; --redDim: rgba(240,100,96,0.1);
    --amber: #f59f45; --amberDim: rgba(245,159,69,0.1);
    --purple: #9b72e8; --purpleDim: rgba(155,114,232,0.1);
    --radius: 12px; --font-sans: 'DM Sans', sans-serif; --font-serif: 'Instrument Serif', Georgia, serif; --font-mono: 'DM Mono', monospace;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; }
  textarea, input { font-family: inherit; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes gridFloat { 0%,100% { opacity:0.03; } 50% { opacity:0.06; } }

  .fade-up { animation: fadeUp 0.6s ease both; }
  .spin { animation: spin 0.8s linear infinite; }

  /* Layout */
  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }

  /* Nav */
  .nav { position: sticky; top: 0; z-index: 100; background: rgba(13,15,20,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; max-width: 1140px; margin: 0 auto; }
  .nav-logo { font-family: var(--font-serif); font-size: 22px; color: var(--gold); letter-spacing: -0.01em; }
  .nav-logo span { color: var(--muted); font-size: 14px; font-family: var(--font-mono); margin-left: 8px; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-btn { background: var(--goldDim); border: 1px solid rgba(232,184,75,0.25); color: var(--gold); padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .nav-btn:hover { background: rgba(232,184,75,0.2); }
  .nav-link { color: var(--muted); font-size: 14px; padding: 7px 12px; border-radius: 8px; transition: color 0.2s; cursor: pointer; }
  .nav-link:hover, .nav-link.active { color: var(--text); }

  /* Hero */
  .hero { padding: 72px 0 56px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 50% at 50% 0%, rgba(232,184,75,0.07) 0%, transparent 70%); pointer-events:none; }
  .hero-badge { display: inline-flex; align-items: center; gap: 7px; background: var(--goldDim); border: 1px solid rgba(232,184,75,0.2); color: var(--gold); padding: 5px 14px; border-radius: 100px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; margin-bottom: 28px; }
  .hero-badge::before { content:'●'; animation: pulse 2s ease-in-out infinite; }
  .hero-h1 { font-family: var(--font-serif); font-size: clamp(36px,5.5vw,68px); line-height: 1.05; color: #f5f0e8; letter-spacing: -0.02em; margin-bottom: 20px; }
  .hero-h1 em { font-style: italic; color: var(--gold); }
  .hero-sub { font-size: 17px; color: var(--muted); max-width: 520px; margin: 0 auto 36px; line-height: 1.8; }
  .hero-ctas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: var(--gold); color: #0d0f14; padding: 13px 28px; border-radius: 10px; font-weight: 600; font-size: 15px; transition: all 0.2s; }
  .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,184,75,0.25); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 13px 28px; border-radius: 10px; font-weight: 500; font-size: 15px; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--border2); background: var(--surface2); }

  /* Stats bar */
  .stats-bar { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 20px 0; }
  .stat-item { text-align: center; }
  .stat-val { font-family: var(--font-serif); font-size: 28px; color: var(--gold); line-height: 1; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 5px; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Section */
  .section { padding: 56px 0; }
  .section-header { margin-bottom: 32px; }
  .section-tag { font-family: var(--font-mono); font-size: 10px; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
  .section-title { font-family: var(--font-serif); font-size: clamp(24px, 3.5vw, 36px); color: #f0ece2; line-height: 1.2; }
  .section-sub { font-size: 15px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .card:hover { border-color: var(--border2); }
  .card-pad { padding: 20px; }

  /* Circular list item */
  .circular-item { display: flex; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .circular-item:hover { background: rgba(255,255,255,0.02); }
  .circular-item:last-child { border-bottom: none; }
  .circ-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 500; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .circ-source-RBI   { background: rgba(77,157,224,0.12); color: var(--blue); }
  .circ-source-SEBI  { background: rgba(155,114,232,0.12); color: var(--purple); }
  .circ-source-IRDAI { background: rgba(62,207,142,0.12); color: var(--green); }
  .circ-cat   { background: var(--surface2); color: var(--muted); }
  .circ-risk-HIGH   { background: var(--redDim); color: var(--red); }
  .circ-risk-MEDIUM { background: var(--amberDim); color: var(--amber); }
  .circ-risk-LOW    { background: var(--greenDim); color: var(--green); }
  .circ-title { font-size: 14px; color: var(--text); line-height: 1.5; font-weight: 500; }
  .circ-meta  { font-family: var(--font-mono); font-size: 10px; color: var(--muted2); margin-top: 4px; }
  .circ-summary { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

  /* Filter bar */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-chip { font-family: var(--font-mono); font-size: 11px; padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; background: var(--surface); white-space: nowrap; }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--goldDim); border-color: rgba(232,184,75,0.3); color: var(--gold); }

  /* Analyze tool */
  .analyze-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .analyze-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; color: var(--text); font-size: 13px; line-height: 1.7; resize: vertical; min-height: 160px; outline: none; transition: border-color 0.2s; }
  .analyze-textarea:focus { border-color: rgba(232,184,75,0.4); }
  .analyze-textarea::placeholder { color: var(--muted2); }
  .btn-analyze { background: var(--gold); color: #0d0f14; padding: 12px 24px; border-radius: 9px; font-weight: 600; font-size: 14px; margin-top: 12px; transition: all 0.2s; width: 100%; }
  .btn-analyze:hover:not(:disabled) { background: var(--gold2); }
  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Result panels */
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
  .result-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .result-panel-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px; }
  .checklist-item { display: flex; gap: 8px; font-size: 13px; color: var(--muted); line-height: 1.6; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .checklist-item::before { content:'☐'; color: var(--green); flex-shrink: 0; }
  .faq-item { margin-bottom: 12px; }
  .faq-q { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .faq-a { font-size: 12px; color: var(--muted); line-height: 1.65; }
  .risk-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
  .risk-HIGH   { background: var(--redDim); color: var(--red); border: 1px solid rgba(240,100,96,0.25); }
  .risk-MEDIUM { background: var(--amberDim); color: var(--amber); border: 1px solid rgba(245,159,69,0.25); }
  .risk-LOW    { background: var(--greenDim); color: var(--green); border: 1px solid rgba(62,207,142,0.25); }

  /* Circular detail */
  .detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
  .detail-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; margin-bottom: 16px; }
  .detail-section h3 { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
  .plain-english { font-size: 15px; color: #ccc8c0; line-height: 1.9; }

  /* Subscribe */
  .subscribe-box { background: linear-gradient(135deg, var(--surface) 0%, #161924 100%); border: 1px solid rgba(232,184,75,0.15); border-radius: 16px; padding: 36px; text-align: center; }
  .subscribe-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 9px; padding: 12px 16px; color: var(--text); font-size: 14px; width: 100%; outline: none; transition: border-color 0.2s; }
  .subscribe-input:focus { border-color: rgba(232,184,75,0.4); }
  .subscribe-select { background: var(--bg); border: 1px solid var(--border2); border-radius: 9px; padding: 12px 16px; color: var(--text); font-size: 14px; width: 100%; outline: none; cursor: pointer; }

  /* Loading */
  .loader { width: 20px; height: 20px; border: 2px solid rgba(232,184,75,0.2); border-top-color: var(--gold); border-radius: 50%; display: inline-block; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 0; }

  /* Footer */
  .footer { border-top: 1px solid var(--border); padding: 36px 0; }
  .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .footer-copy { font-family: var(--font-mono); font-size: 11px; color: var(--muted2); }

  @media (max-width: 768px) {
    .grid-2, .grid-3, .grid-4, .result-grid { grid-template-columns: 1fr; }
    .hero { padding: 48px 0 40px; }
    .hero-h1 { font-size: 34px; }
    .nav-links .nav-link { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const CATEGORIES = ['All','KYC','Credit','NPA','Digital','Operations','Penal','Treasury','Other'];
const SOURCES = ['All','RBI','SEBI','IRDAI'];

// ── API helpers ──────────────────────────────────────────────────────
const api = {
  async get(path) {
    const r = await fetch(`/api${path}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(`/api${path}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    return r.json();
  },
};

// ── Components ───────────────────────────────────────────────────────

function Spinner() {
  return <div className="loader spin" />;
}

function RiskBadge({ rating }) {
  if (!rating) return null;
  return <span className={`risk-badge risk-${rating}`}>{'⬤ '}{rating} RISK</span>;
}

function SourceBadge({ source }) {
  return <span className={`circ-badge circ-source-${source}`}>{source}</span>;
}

function CatBadge({ cat }) {
  if (!cat) return null;
  return <span className="circ-badge circ-cat">{cat}</span>;
}

// ── Circular List Item ────────────────────────────────────────────────
function CircularItem({ c, onClick }) {
  return (
    <div className="circular-item" onClick={() => onClick(c.id)}>
      <div style={{flex:1, minWidth:0}}>
        <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:6}}>
          <SourceBadge source={c.source} />
          {c.category && <CatBadge cat={c.category} />}
          {c.risk_rating && <span className={`circ-badge circ-risk-${c.risk_rating}`}>{c.risk_rating}</span>}
          {c.has_deadline ? <span className="circ-badge" style={{background:'rgba(240,100,96,0.1)',color:'#f06460'}}>⏰ DEADLINE</span> : null}
        </div>
        <div className="circ-title">{c.title}</div>
        {c.summary && <div className="circ-summary">{c.summary}</div>}
        <div className="circ-meta">
          {c.ref_no && <>{c.ref_no} · </>}
          {c.issued_date || 'Date pending'} · {c.status}
        </div>
      </div>
      <div style={{color:'#444', fontSize:18, alignSelf:'center'}}>›</div>
    </div>
  );
}

// ── Circular Detail ───────────────────────────────────────────────────
function CircularDetail({ id, onBack }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    api.get(`/circulars/${id}`).then(r => {
      setData(r.data);
      setLoading(false);
    });
  }, [id]);

  if (loading) return <div style={{textAlign:'center',padding:60}}><Spinner /></div>;
  if (!data) return <div className="empty-state"><div className="empty-icon">⚠</div>Circular not found.</div>;

  const checklist = Array.isArray(data.checklist) ? data.checklist : [];
  const faqs = Array.isArray(data.faqs) ? data.faqs : [];
  const actionItems = Array.isArray(data.action_items) ? data.action_items : [];
  const affectedRoles = Array.isArray(data.affected_roles) ? data.affected_roles : [];

  return (
    <div className="fade-up">
      <button onClick={onBack} style={{background:'none',border:'1px solid var(--border)',color:'var(--muted)',padding:'8px 14px',borderRadius:8,fontSize:13,marginBottom:20,display:'flex',alignItems:'center',gap:6}}>
        ← Back
      </button>

      <div className="detail-header">
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
          <SourceBadge source={data.source} />
          {data.category && <CatBadge cat={data.category} />}
          {data.risk_rating && <RiskBadge rating={data.risk_rating} />}
        </div>
        <h1 style={{fontFamily:'var(--font-serif)',fontSize:'clamp(20px,3vw,30px)',color:'#f0ece2',lineHeight:1.25,marginBottom:10}}>
          {data.title}
        </h1>
        <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--muted)',display:'flex',gap:16,flexWrap:'wrap'}}>
          {data.ref_no && <span>REF: {data.ref_no}</span>}
          {data.issued_date && <span>ISSUED: {data.issued_date}</span>}
          {data.deadline_date && <span style={{color:'var(--red)'}}>⏰ DEADLINE: {data.deadline_date}</span>}
          {data.validated_by && <span style={{color:'var(--green)'}}>✓ VALIDATED: {data.validated_by}</span>}
        </div>
        {data.url && (
          <a href={data.url} target="_blank" rel="noopener" style={{display:'inline-block',marginTop:12,fontFamily:'var(--font-mono)',fontSize:11,color:'var(--blue)',textDecoration:'underline'}}>
            View original circular ↗
          </a>
        )}
      </div>

      {data.risk_rationale && (
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`3px solid ${data.risk_rating==='HIGH'?'var(--red)':data.risk_rating==='MEDIUM'?'var(--amber)':'var(--green)'}`,borderRadius:12,padding:'16px 20px',marginBottom:16}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:'0.15em',color:'var(--muted)',textTransform:'uppercase',marginBottom:6}}>Risk Rationale</div>
          <div style={{fontSize:14,color:'var(--muted)',lineHeight:1.7}}>{data.risk_rationale}</div>
        </div>
      )}

      {data.plain_english && (
        <div className="detail-section">
          <h3>Plain-English Explanation</h3>
          <p className="plain-english">{data.plain_english}</p>
        </div>
      )}

      <div className="grid-2">
        {checklist.length > 0 && (
          <div className="detail-section">
            <h3>Compliance Checklist</h3>
            {checklist.map((item, i) => (
              <div key={i} className="checklist-item">{item}</div>
            ))}
          </div>
        )}
        {faqs.length > 0 && (
          <div className="detail-section">
            <h3>FAQs for Officers</h3>
            {faqs.map((faq, i) => (
              <div key={i} className="faq-item">
                <div className="faq-q">Q: {faq.q}</div>
                <div className="faq-a">A: {faq.a}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {actionItems.length > 0 && (
        <div className="detail-section">
          <h3>Action Items by Role</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {actionItems.map((a, i) => (
              <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'10px 12px',background:'var(--surface2)',borderRadius:8}}>
                <span style={{fontFamily:'var(--font-mono)',fontSize:9,padding:'3px 8px',borderRadius:4,background:a.urgency==='IMMEDIATE'?'var(--redDim)':a.urgency==='THIS_WEEK'?'var(--amberDim)':'var(--greenDim)',color:a.urgency==='IMMEDIATE'?'var(--red)':a.urgency==='THIS_WEEK'?'var(--amber)':'var(--green)',whiteSpace:'nowrap',flexShrink:0}}>{a.urgency}</span>
                <div>
                  <div style={{fontSize:13,color:'var(--text)'}}>{a.task}</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--muted)',marginTop:3}}>{a.role}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {data.deadline_alert && (
        <div style={{background:'rgba(240,100,96,0.07)',border:'1px solid rgba(240,100,96,0.2)',borderRadius:12,padding:'16px 20px',marginTop:4}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:9,letterSpacing:'0.15em',color:'var(--red)',textTransform:'uppercase',marginBottom:6}}>⏰ Deadline Alert</div>
          <div style={{fontSize:14,color:'#e0a0a0',lineHeight:1.7}}>{data.deadline_alert}</div>
        </div>
      )}
    </div>
  );
}

// ── Analyze Tool ──────────────────────────────────────────────────────
function AnalyzeTool() {
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const analyze = async () => {
    if (!text.trim() || text.trim().length < 30) return;
    setLoading(true); setError(''); setResult(null);
    try {
      const r = await api.post('/analyze', { text });
      if (!r.success) throw new Error(r.error);
      setResult(r.data);
    } catch (e) {
      setError(e.message || 'Analysis failed. Please try again.');
    }
    setLoading(false);
  };

  const { classification: cls, assessment: a } = result || {};
  const checklist = a?.checklist || [];
  const faqs = a?.faqs || [];

  return (
    <div>
      <div className="analyze-box">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <div style={{width:36,height:36,borderRadius:9,background:'var(--goldDim)',border:'1px solid rgba(232,184,75,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🧠</div>
          <div>

// ── Circular Feed ─────────────────────────────────────────────────────
function CircularFeed({ onSelectCircular }) {
  const [circulars, setCirculars] = useState([]);
  const [loading, setLoading] = useState(true);
  const [source, setSource] = useState('All');
  const [category, setCategory] = useState('All');
  const [search, setSearch] = useState('');
  const [offset, setOffset] = useState(0);
  const LIMIT = 15;

  const load = useCallback(async (reset = false) => {
    setLoading(true);
    const params = new URLSearchParams({ limit: LIMIT, offset: reset ? 0 : offset });
    if (source !== 'All') params.set('source', source);
    if (category !== 'All') params.set('category', category);
    if (search) params.set('search', search);
    const r = await api.get(`/circulars?${params}`);
    if (r.success) {
      setCirculars(reset ? r.data : prev => [...prev, ...r.data]);
    }
    setLoading(false);
  }, [source, category, search, offset]);

  useEffect(() => { setOffset(0); load(true); }, [source, category, search]);

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <input
          type="text"
          placeholder="Search circulars..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:9,padding:'9px 14px',color:'var(--text)',fontSize:13,outline:'none',minWidth:200,flex:1}}
        />
      </div>

      <div style={{marginBottom:10}}>
        <div className="filter-bar">
          {SOURCES.map(s => (
            <button key={s} className={`filter-chip ${source===s?'active':''}`} onClick={() => setSource(s)}>{s}</button>
          ))}
        </div>
        <div className="filter-bar">
          {CATEGORIES.map(c => (
            <button key={c} className={`filter-chip ${category===c?'active':''}`} onClick={() => setCategory(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="card">
        {circulars.length === 0 && !loading && (
          <div className="empty-state">
            <div className="empty-icon">📋</div>
            No circulars yet. The scraper runs every 6 hours.
          </div>
        )}
        {circulars.map(c => <CircularItem key={c.id} c={c} onClick={onSelectCircular} />)}
        {loading && <div style={{textAlign:'center',padding:24}}><Spinner /></div>}
        {!loading && circulars.length >= LIMIT && (
          <div style={{textAlign:'center',padding:16}}>
            <button className="btn-secondary" style={{fontSize:13,padding:'9px 20px'}} onClick={() => { setOffset(o => o+LIMIT); load(); }}>
              Load more
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Subscribe ─────────────────────────────────────────────────────────
function Subscribe() {
  const [form, setForm] = useState({ email:'', name:'', role:'compliance_officer', frequency:'daily' });
  const [cats, setCats] = useState(['all']);
  const [status, setStatus] = useState('');
  const [loading, setLoading] = useState(false);

  const toggle = cat => setCats(prev => prev.includes(cat) ? prev.filter(c=>c!==cat) : [...prev, cat]);

  const submit = async () => {
    if (!form.email.includes('@')) return setStatus('error:Valid email required');
    setLoading(true);
    const r = await api.post('/subscribe', { ...form, categories: cats });
    setStatus(r.success ? 'ok' : `error:${r.error}`);
    setLoading(false);
  };

  if (status === 'ok') return (
    <div className="subscribe-box">
      <div style={{fontSize:40,marginBottom:12}}>✅</div>
      <div style={{fontFamily:'var(--font-serif)',fontSize:22,color:'#f0ece2',marginBottom:8}}>You're subscribed!</div>
      <div style={{color:'var(--muted)',fontSize:14}}>Check your email to confirm. You'll receive alerts for new circulars.</div>
    </div>
  );

  return (
    <div className="subscribe-box">
      <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--gold)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:12}}>Free Alert Digest</div>
      <h2 style={{fontFamily:'var(--font-serif)',fontSize:'clamp(22px,3vw,30px)',color:'#f0ece2',marginBottom:8,lineHeight:1.2}}>Never miss a regulatory update</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginBottom:28,maxWidth:420,margin:'0 auto 28px'}}>Get plain-English summaries of new RBI, SEBI and IRDAI circulars relevant to your role — daily or weekly.</p>

      <div style={{maxWidth:460,margin:'0 auto',textAlign:'left'}}>
        <div className="grid-2" style={{marginBottom:12}}>
          <input className="subscribe-input" placeholder="Your email" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} />
          <input className="subscribe-input" placeholder="Your name (optional)" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} />
        </div>
        <div className="grid-2" style={{marginBottom:16}}>
          <select className="subscribe-select" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
            <option value="compliance_officer">Compliance Officer</option>
            <option value="branch_manager">Branch Manager</option>
            <option value="credit_officer">Credit Officer</option>
            <option value="operations">Operations</option>
            <option value="other">Other</option>
          </select>
          <select className="subscribe-select" value={form.frequency} onChange={e=>setForm({...form,frequency:e.target.value})}>
            <option value="instant">Instant (new circulars)</option>
            <option value="daily">Daily digest</option>
            <option value="weekly">Weekly digest</option>
          </select>
        </div>

        <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:10}}>Topics</div>
        <div className="filter-bar" style={{marginBottom:20}}>
          {['all','KYC','Credit','NPA','Digital','Operations','Penal'].map(c => (
            <button key={c} className={`filter-chip ${cats.includes(c)?'active':''}`} onClick={() => toggle(c)}>{c==='all'?'All Topics':c}</button>
          ))}
        </div>

        {status.startsWith('error:') && <div style={{color:'var(--red)',fontFamily:'var(--font-mono)',fontSize:12,marginBottom:10}}>⚠ {status.slice(6)}</div>}
        <button className="btn-primary" style={{width:'100%'}} onClick={submit} disabled={loading}>
          {loading ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><Spinner /> Subscribing...</span> : '→ Subscribe — Free'}
        </button>
      </div>
    </div>
  );
}

// ── Stats ─────────────────────────────────────────────────────────────
function StatsBar() {
  const [stats, setStats] = useState(null);

  useEffect(() => {
    api.get('/stats').then(r => r.success && setStats(r.data));
  }, []);

  const items = stats ? [
    { val: stats.processed || 0, label: 'Circulars Processed' },
    { val: stats.today || 0, label: 'New Today' },
    { val: stats.highRisk || 0, label: 'High Risk' },
    { val: stats.subscribers || 0, label: 'Subscribers' },
  ] : [
    { val: '—', label: 'Circulars Processed' },
    { val: '—', label: 'New Today' },
    { val: '—', label: 'High Risk' },
    { val: '—', label: 'Subscribers' },
  ];

  return (
    <div className="stats-bar">
      <div className="container">
        <div className="grid-4">
          {items.map((s,i) => (
            <div key={i} className="stat-item">
              <div className="stat-val">{s.val}</div>
              <div className="stat-label">{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
